schema_version: "2"
circuit:
  id: sweep
  version: "2026-04-04"
  purpose: >
    Systematic codebase sweeps: cleanup, quality passes, coverage
    improvements, docs-sync.

  entry:
    expert_command: /circuit:sweep
    signals:
      include: [dead_code, stale_docs, cleanup, quality, coverage, overnight]
      exclude: [feature, architecture_decision, migration]

  entry_modes:
    default:
      start_at: frame
      description: Standard sweep. Pauses only at high-risk boundaries.
    lite:
      start_at: frame
      description: Quick scan, high-confidence items only.
    autonomous:
      start_at: frame
      description: Unattended sweep with evidence-gated auto-approval.

  steps:
    - id: frame
      title: Frame
      executor: orchestrator
      kind: checkpoint
      protocol: sweep-frame@v1
      reads: [user.task, repo.snapshot]
      writes:
        artifact:
          path: artifacts/brief.md
          schema: brief-sweep@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: sweep_frame
        options: [continue]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue]
      routes:
        continue: survey

    - id: survey
      title: Survey
      executor: worker
      kind: dispatch
      protocol: sweep-survey@v1
      reads: [artifacts/brief.md]
      writes:
        artifact:
          path: artifacts/analysis.md
          schema: analysis-sweep@v1
        request: jobs/{step_id}-{attempt}.request.json
        receipt: jobs/{step_id}-{attempt}.receipt.json
        result: jobs/{step_id}-{attempt}.result.json
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}.result.json
        pass: [outputs_ready]
      routes:
        pass: triage

    - id: triage
      title: Queue/Triage
      executor: orchestrator
      kind: synthesis
      protocol: sweep-triage@v1
      reads: [artifacts/brief.md, artifacts/analysis.md]
      writes:
        artifact:
          path: artifacts/queue.md
          schema: queue@v1
      gate:
        kind: schema_sections
        source: artifacts/queue.md
        required: [Classified Items, Batch Assignment]
      routes:
        pass: execute

    - id: execute
      title: Batch Execute
      executor: worker
      kind: dispatch
      protocol: sweep-execute@v1
      reads: [artifacts/queue.md, artifacts/brief.md]
      writes:
        artifact:
          path: artifacts/batch-results.md
          schema: batch-results@v1
        request: jobs/{step_id}-{attempt}.request.json
        receipt: jobs/{step_id}-{attempt}.receipt.json
        result: jobs/{step_id}-{attempt}.result.json
      budgets:
        max_attempts: 3
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}.result.json
        pass: [complete_and_hardened, partial]
      routes:
        pass: verify

    - id: verify
      title: Verify
      executor: worker
      kind: dispatch
      protocol: sweep-verify@v1
      reads: [artifacts/queue.md, artifacts/brief.md]
      writes:
        artifact:
          path: artifacts/review.md
          schema: review@v1
        request: jobs/{step_id}-{attempt}.request.json
        receipt: jobs/{step_id}-{attempt}.receipt.json
        result: jobs/{step_id}-{attempt}.result.json
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}.result.json
        pass: [clean, ship_ready]
      routes:
        pass: deferred

    - id: deferred
      title: Deferred Review
      executor: orchestrator
      kind: synthesis
      protocol: sweep-deferred@v1
      reads: [artifacts/queue.md, artifacts/review.md]
      writes:
        artifact:
          path: artifacts/deferred.md
          schema: deferred@v1
      gate:
        kind: schema_sections
        source: artifacts/deferred.md
        required: [Summary, Items]
      routes:
        pass: close

    - id: close
      title: Close
      executor: orchestrator
      kind: synthesis
      protocol: sweep-close@v1
      reads: [artifacts/brief.md, artifacts/queue.md, artifacts/deferred.md, optional:artifacts/review.md]
      writes:
        artifact:
          path: artifacts/result.md
          schema: result@v1
      gate:
        kind: schema_sections
        source: artifacts/result.md
        required: [Summary, Verification]
      routes:
        pass: "@complete"
