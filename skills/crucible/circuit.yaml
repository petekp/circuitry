schema_version: "1"
circuit:
  id: crucible
  version: "2026-04-01"
  title: Crucible
  description: >
    Adversarial tournament circuit that pressure-tests solutions. 7 steps across
    4 phases: Framing -> Diverge -> Converge -> Harden. Throws multiple approaches
    into parallel exploration, stress-tests each via red-team review, selects and
    synthesizes the strongest, then hardens through pre-mortem review. Topology
    only — this file does not encode runtime behavior or adapter contracts.

  phases:
    - id: framing
      title: Framing
      execution: serial
      steps:
        - id: problem-intake
          title: Problem Intake
          action: interactive
          produces: problem-brief.md
          gate:
            type: outputs_present
            required: [problem-brief.md]
            checks:
              - "Problem Statement non-empty"
              - "Constraints present (may state 'none identified')"

    - id: diverge
      title: Diverge
      execution: serial
      steps:
        - id: parallel-exploration
          title: Parallel Exploration
          action: dispatch
          execution: parallel
          workers:
            - id: explorer-a
              title: Exploration A
              produces: proposal-a.md
            - id: explorer-b
              title: Exploration B
              produces: proposal-b.md
            - id: explorer-c
              title: Exploration C
              produces: proposal-c.md
          consumes: [problem-brief.md]
          produces: [proposal-a.md, proposal-b.md, proposal-c.md]
          gate:
            type: outputs_present
            required: [proposal-a.md, proposal-b.md, proposal-c.md]
            checks:
              - "Each proposal contains Approach, Rationale, Tradeoffs, Implementation Sketch"

        - id: adversarial-review
          title: Adversarial Review
          action: dispatch
          execution: parallel
          workers:
            - id: reviewer-a
              title: Review A
              consumes: [proposal-a.md]
              produces: review-a.md
            - id: reviewer-b
              title: Review B
              consumes: [proposal-b.md]
              produces: review-b.md
            - id: reviewer-c
              title: Review C
              consumes: [proposal-c.md]
              produces: review-c.md
          consumes: [proposal-a.md, proposal-b.md, proposal-c.md]
          produces: [review-a.md, review-b.md, review-c.md]
          gate:
            type: outputs_present
            required: [review-a.md, review-b.md, review-c.md]
            checks:
              - "Each review contains Strengths, Weaknesses, Hidden Assumptions, Feasibility Assessment, Verdict"

        - id: strengthened-proposals
          title: Strengthened Proposals
          action: dispatch
          execution: parallel
          workers:
            - id: reviser-a
              title: Revision A
              consumes: [proposal-a.md, review-a.md]
              produces: revised-a.md
            - id: reviser-b
              title: Revision B
              consumes: [proposal-b.md, review-b.md]
              produces: revised-b.md
            - id: reviser-c
              title: Revision C
              consumes: [proposal-c.md, review-c.md]
              produces: revised-c.md
          consumes: [proposal-a.md, proposal-b.md, proposal-c.md, review-a.md, review-b.md, review-c.md]
          produces: [revised-a.md, revised-b.md, revised-c.md]
          gate:
            type: outputs_present
            required: [revised-a.md, revised-b.md, revised-c.md]
            checks:
              - "Each revised proposal contains Approach, Rationale, Tradeoffs, Implementation Sketch, Changes from Original"

    - id: converge
      title: Converge
      execution: serial
      steps:
        - id: selection-synthesis
          title: Selection + Synthesis
          action: synthesis
          consumes: [revised-a.md, revised-b.md, revised-c.md, review-a.md, review-b.md, review-c.md]
          produces: selection-synthesis.md
          gate:
            type: verdict-reopen
            required: [selection-synthesis.md]
            checks:
              - "Selection Rationale names the selected approach"
              - "Synthesized Elements lists ideas absorbed from non-selected proposals"
              - "Merged Proposal present"
            outcomes:
              all_approaches_inadequate: reopen-step-2
              ready: continue

    - id: harden
      title: Harden
      execution: serial
      steps:
        - id: pre-mortem
          title: Pre-mortem Review
          action: dispatch
          consumes: [selection-synthesis.md]
          produces: pre-mortem.md
          gate:
            type: outputs_present
            required: [pre-mortem.md]
            checks:
              - "Failure Scenarios present (3-5 specific)"
              - "Edge Cases present"
              - "Blind Spots present"
              - "Environmental Risks present"

        - id: final-revision
          title: Final Revision
          action: dispatch
          consumes: [selection-synthesis.md, pre-mortem.md]
          produces: final-proposal.md
          gate:
            type: verdict-reopen
            required: [final-proposal.md]
            checks:
              - "Pre-mortem findings adequately addressed"
            outcomes:
              satisfied: complete
              pre_mortem_gaps: reopen-step-6
              synthesis_flawed: reopen-step-5
              fundamentally_unsatisfied: reopen-step-2
