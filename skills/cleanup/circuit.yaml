schema_version: "2"
circuit:
  id: cleanup
  version: "2026-04-01"
  purpose: >
    Systematic codebase cleanup: dead code, stale docs, orphaned artifacts,
    vestigial comments, and redundant abstractions.

  entry:
    expert_command: /circuit:cleanup
    signals:
      include: [dead_code, stale_docs, orphaned_artifacts]
      exclude: [architecture_decision, migration, overnight]

  entry_modes:
    default:
      start_at: cleanup-scope
      description: Interactive cleanup with user checkpoints at triage and batch boundaries.
    auto:
      start_at: cleanup-scope
      description: Autonomous evidence-gated cleanup with deferred review.

  steps:
    # ── Phase 1: Survey ──────────────────────────────────────────────────
    - id: cleanup-scope
      title: Cleanup Scope
      executor: orchestrator
      kind: checkpoint
      protocol: cleanup-scope@v1
      reads: [user.task, repo.snapshot]
      writes:
        artifact:
          path: artifacts/cleanup-scope.md
          schema: cleanup-scope@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: cleanup_scope
        options: [continue]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue]
      routes:
        continue: category-survey-fanout

    - id: category-survey-fanout
      title: Category Survey Fanout
      executor: worker
      kind: dispatch
      protocol: category-survey-fanout@v1
      reads: [artifacts/cleanup-scope.md]
      writes:
        artifacts:
          - path: artifacts/dead-code-findings.md
            schema: category-findings@v1
          - path: artifacts/stale-docs-findings.md
            schema: category-findings@v1
          - path: artifacts/orphaned-artifacts-findings.md
            schema: category-findings@v1
          - path: artifacts/vestigial-comments-findings.md
            schema: category-findings@v1
          - path: artifacts/redundant-abstractions-findings.md
            schema: category-findings@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [outputs_ready]
      routes:
        pass: survey-consolidation
        fail: "@escalate"

    - id: survey-consolidation
      title: Survey Consolidation
      executor: orchestrator
      kind: synthesis
      reads:
        - artifacts/dead-code-findings.md
        - artifacts/stale-docs-findings.md
        - artifacts/orphaned-artifacts-findings.md
        - artifacts/vestigial-comments-findings.md
        - artifacts/redundant-abstractions-findings.md
        - artifacts/cleanup-scope.md
      writes:
        artifact:
          path: artifacts/survey-inventory.md
          schema: survey-inventory@v1
      gate:
        kind: schema_sections
        source: artifacts/survey-inventory.md
        required: [Candidates, Cross-Category Deduplication, Ambiguity Flags]
      routes:
        pass: triage-classification
        fail: "@escalate"

    # ── Phase 2: Triage ──────────────────────────────────────────────────
    - id: triage-classification
      title: Triage Classification
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/survey-inventory.md, artifacts/cleanup-scope.md]
      writes:
        artifact:
          path: artifacts/triage-report.md
          schema: triage-report@v1
      gate:
        kind: schema_sections
        source: artifacts/triage-report.md
        required: [Classification Table, Confidence Scores, Risk Assessment, Action Plan]
      routes:
        pass: evidence-adjudication
        fail: "@escalate"

    # ── Phase 3: Prove ───────────────────────────────────────────────────
    - id: evidence-adjudication
      title: Evidence Adjudication
      executor: worker
      kind: dispatch
      protocol: evidence-adjudication@v1
      reads: [artifacts/triage-report.md, artifacts/cleanup-scope.md]
      writes:
        artifact:
          path: artifacts/evidence-log.md
          schema: evidence-log@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      budgets:
        max_attempts: 2
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [evidence_sufficient]
        reroute:
          queue_adjustment_required: triage-classification
          risk_boundary_invalidated: cleanup-scope
      routes:
        pass: cleanup-batch-execution
        fail: "@escalate"

    # ── Phase 4: Clean ───────────────────────────────────────────────────
    - id: cleanup-batch-execution
      title: Cleanup Batch Execution
      executor: worker
      kind: dispatch
      protocol: workers-execute@v1
      reads: [artifacts/triage-report.md, artifacts/evidence-log.md, artifacts/cleanup-scope.md]
      writes:
        artifact:
          path: artifacts/cleanup-batches.md
          schema: cleanup-batches@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      budgets:
        max_attempts: 3
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [complete_and_hardened]
      routes:
        pass: verification-audit
        fail: "@escalate"

    # ── Phase 5: Verify ──────────────────────────────────────────────────
    - id: verification-audit
      title: Verification Audit
      executor: worker
      kind: dispatch
      protocol: verification-audit@v1
      reads:
        - artifacts/cleanup-batches.md
        - artifacts/triage-report.md
        - artifacts/evidence-log.md
        - artifacts/cleanup-scope.md
      writes:
        artifact:
          path: artifacts/verification-audit.md
          schema: verification-audit@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [audit_complete]
      routes:
        pass: verification-synthesis
        fail: "@escalate"

    - id: verification-synthesis
      title: Verification Synthesis
      executor: orchestrator
      kind: synthesis
      reads:
        - artifacts/cleanup-batches.md
        - artifacts/verification-audit.md
        - artifacts/triage-report.md
        - artifacts/evidence-log.md
      writes:
        artifacts:
          - path: artifacts/verification-report.md
            schema: verification-report@v1
          - path: artifacts/deferred-review.md
            schema: deferred-review@v1
      gate:
        kind: schema_sections
        source: artifacts/verification-report.md
        required: [Verdict, Check Results, Deferred Items]
      routes:
        pass: "@complete"
        fail: "@escalate"
