schema_version: "1"
circuit:
  id: create
  version: "2026-03-26"
  title: Circuit Create
  description: >
    Worker-powered compiler for turning a natural-language workflow description
    into a circuit skill that matches the live corpus. Chains workflow brief ->
    circuit analysis -> draft files -> validation report -> refined install across
    5 phases. Topology only - this file does not encode runtime behavior or
    authoring references.

  artifacts:
    - id: workflow-brief.md
      type: interactive
      produced_by: workflow-intake
      consumed_by: [pattern-mapping, compile-circuit-files]
    - id: circuit-analysis.md
      type: dispatch
      produced_by: pattern-mapping
      consumed_by: [compile-circuit-files]
    - id: draft-circuit.yaml
      type: dispatch
      produced_by: compile-circuit-files
      consumed_by: [quality-gate, claude-code-refinement]
    - id: draft-SKILL.md
      type: dispatch
      produced_by: compile-circuit-files
      consumed_by: [quality-gate, claude-code-refinement]
    - id: cross-validation.md
      type: dispatch
      produced_by: compile-circuit-files
      consumed_by: [quality-gate, claude-code-refinement]
    - id: validation-report.md
      type: dispatch
      produced_by: quality-gate
      consumed_by: [claude-code-refinement]
    - id: circuit.yaml
      type: synthesis
      produced_by: claude-code-refinement
      consumed_by: []
    - id: SKILL.md
      type: synthesis
      produced_by: claude-code-refinement
      consumed_by: []

  phases:
    - id: intake
      title: Intake
      execution: serial
      steps:
        - id: workflow-intake
          title: Workflow Intake
          action: interactive
          produces: workflow-brief.md
          gate:
            type: outputs_present
            required: [workflow-brief.md]
            checks:
              - "Circuit goal explicit"
              - "Trigger surface and negative scope explicit"
              - "Circuit family explicit or intentionally unresolved"
              - "Output target explicit"

    - id: analysis
      title: Analysis
      execution: serial
      steps:
        - id: pattern-mapping
          title: Pattern Mapping
          action: dispatch
          consumes: [workflow-brief.md]
          produces: circuit-analysis.md
          gate:
            type: outputs_present
            required: [circuit-analysis.md]
            checks:
              - "Phase topology explicit"
              - "Action types, artifact chain, and external inputs explicit"
              - "Gate, reopen, and resume plan explicit"
          notes: >
            Worker reads the workflow brief and maps it to the live circuit
            patterns. Determines artifact-centric vs validator family.

    - id: authoring
      title: Authoring
      execution: serial
      steps:
        - id: compile-circuit-files
          title: Compile Circuit Files
          action: dispatch
          consumes: [workflow-brief.md, circuit-analysis.md]
          produces: [draft-circuit.yaml, draft-SKILL.md, cross-validation.md]
          gate:
            type: outputs_present
            required: [draft-circuit.yaml, draft-SKILL.md, cross-validation.md]
            checks:
              - "Draft files agree on topology, triggers, and gate semantics"
              - "Starter templates, decision table, quality gate, and anti-pattern catalog present"
              - "Compiler-only scope, resume rules, and circuit breaker explicit"
          notes: >
            Worker generates draft circuit.yaml and SKILL.md to staging,
            then cross-validates them field by field.

    - id: validation
      title: Validation
      execution: serial
      steps:
        - id: quality-gate
          title: Quality Gate
          action: dispatch
          consumes: [draft-circuit.yaml, draft-SKILL.md, cross-validation.md]
          produces: validation-report.md
          gate:
            type: outputs_present
            required: [validation-report.md]
            checks:
              - "All six quality categories walked explicitly"
              - "Anti-patterns named by ID"
              - "Verdict is READY or REVISE with named issues"
          notes: >
            Review worker walks the six quality categories against the
            draft files. Assessment only - does not modify the drafts.

    - id: refinement
      title: Refinement
      execution: serial
      steps:
        - id: claude-code-refinement
          title: Claude Code Refinement
          action: synthesis
          consumes: [draft-circuit.yaml, draft-SKILL.md, cross-validation.md, validation-report.md]
          produces: [circuit.yaml, SKILL.md]
          gate:
            type: verdict-reopen
            outcomes:
              ready: continue
              revise: interactive-reopen
          notes: >
            Orchestrator reads all upstream artifacts plus validation findings,
            refines for Claude Code optimization, and installs to TARGET_CIRCUIT_ROOT.
            This is the only step that writes to the final skill directory.
