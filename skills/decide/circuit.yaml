schema_version: "1"
circuit:
  id: decide
  version: "2026-03-29"
  title: Decide
  description: >
    Architecture decision workflow for choosing between meaningful architectural
    or protocol options under uncertainty before implementation begins. Chains
    framing -> current-state reality -> serious options -> explicit weighting ->
    pressure test -> published decision guide through 5 phases. Topology only —
    this file does not encode runtime behavior or adapter contracts.

  artifacts:
    - id: decision-brief.md
      type: interactive
      produced_by: decision-frame
      consumed_by: [current-system-map, generate-serious-options, score-and-compare, publish-adr-and-implementation-guide]
    - id: current-system-map.md
      type: dispatch
      produced_by: current-system-map
      consumed_by: [generate-serious-options, score-and-compare, pressure-test-leading-option, publish-adr-and-implementation-guide]
    - id: decision-options.md
      type: dispatch
      produced_by: generate-serious-options
      consumed_by: [score-and-compare, pressure-test-leading-option]
    - id: decision-scorecard.md
      type: synthesis
      produced_by: score-and-compare
      consumed_by: [tradeoff-weighting-checkpoint, pressure-test-leading-option, decision-commit]
    - id: decision-steer.md
      type: interactive
      produced_by: tradeoff-weighting-checkpoint
      consumed_by: [pressure-test-leading-option]
    - id: pressure-report.md
      type: dispatch
      produced_by: pressure-test-leading-option
      consumed_by: [decision-commit, publish-adr-and-implementation-guide]
    - id: decision-choice.md
      type: interactive
      produced_by: decision-commit
      consumed_by: [publish-adr-and-implementation-guide]
    - id: decision-guide.md
      type: synthesis
      produced_by: publish-adr-and-implementation-guide
      consumed_by: []

  phases:
    - id: framing
      title: Framing
      execution: serial
      steps:
        - id: decision-frame
          title: Decision Frame
          action: interactive
          produces: decision-brief.md
          gate:
            type: outputs_present
            required: [decision-brief.md]
            checks:
              - "Decision Question non-empty"
              - "Must-Protect Qualities non-empty"
              - "Non-Decision Space non-empty"

    - id: reality-mapping
      title: Reality Mapping
      execution: serial
      steps:
        - id: current-system-map
          title: Current System Map
          action: dispatch
          skills: [architecture-exploration] # plus domain-skills resolved at runtime
          consumes: [decision-brief.md]
          produces: current-system-map.md
          max_attempts: 2
          gate:
            type: outputs_present
            required: [current-system-map.md]
            checks:
              - "at least one invariant"
              - "at least one operational constraint"
              - "at least one pain point"

    - id: option-exploration
      title: Option Exploration
      execution: serial
      steps:
        - id: generate-serious-options
          title: Generate Serious Options
          action: dispatch
          skills: [solution-explorer, architecture-exploration] # plus domain-skills resolved at runtime
          consumes: [decision-brief.md, current-system-map.md]
          produces: decision-options.md
          max_attempts: 2
          gate:
            type: outputs_present
            required: [decision-options.md]
            checks:
              - "at least three options"
              - "each option differs on at least two of architecture shape, ownership boundary, migration cost, or failure surface"
        - id: score-and-compare
          title: Score and Compare
          action: synthesis
          consumes: [decision-brief.md, current-system-map.md, decision-options.md]
          produces: decision-scorecard.md
          gate:
            type: outputs_present
            required: [decision-scorecard.md]
            checks:
              - "weighted dimensions present"
              - "per-option reasoning present"
              - "confidence labels present"

    - id: pressure
      title: Pressure
      execution: serial
      steps:
        - id: tradeoff-weighting-checkpoint
          title: Tradeoff Weighting Checkpoint
          action: interactive
          consumes: [decision-scorecard.md]
          produces: decision-steer.md
          gate:
            type: outputs_present
            required: [decision-steer.md]
            checks:
              - "Chosen Priority Order explicit"
              - "Risks Willingly Accepted explicit"
              - "maps back to scorecard dimensions"
        - id: pressure-test-leading-option
          title: Pressure Test the Leading Option
          action: dispatch
          skills: [seam-ripper, clean-architecture] # plus domain-skills resolved at runtime
          consumes:
            - current-system-map.md
            - decision-options.md
            - decision-scorecard.md
            - decision-steer.md
          produces: pressure-report.md
          max_attempts: 2
          gate:
            type: outputs_present
            required: [pressure-report.md]
            checks:
              - "at least one plausible failure scenario"
              - "at least one boundary-level objection"
              - "explicit comparison to the strongest alternative"
        - id: decision-commit
          title: Decision Commit
          action: interactive
          consumes: [decision-scorecard.md, pressure-report.md]
          produces: decision-choice.md
          gate:
            type: outputs_present
            required: [decision-choice.md]
            checks:
              - "Chosen Option explicit"
              - "Accepted Downsides explicit"
              - "at least one Rejected Alternative"

    - id: publication
      title: Publication
      execution: serial
      steps:
        - id: publish-adr-and-implementation-guide
          title: Publish ADR and Implementation Guide
          action: synthesis
          consumes: [decision-brief.md, current-system-map.md, decision-choice.md, pressure-report.md]
          produces: decision-guide.md
          gate:
            type: outputs_present
            required: [decision-guide.md]
            checks:
              - "decision rationale present"
              - "implementation-facing guardrails present"
              - "reopen conditions preserved"
