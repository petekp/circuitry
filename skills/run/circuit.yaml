schema_version: "2"
circuit:
  id: run
  version: "2026-04-04"
  purpose: >
    Lightweight router. Classifies tasks into one of five workflows
    (Explore, Build, Repair, Migrate, Sweep), selects a rigor profile,
    and dispatches.

  entry:
    usage: <task>
    signals:
      include: [any_task]
      exclude: []

  entry_modes:
    default:
      start_at: route
      description: Auto-classify task kind and rigor, then dispatch.

  steps:
    - id: route
      title: Route Classification
      executor: orchestrator
      kind: synthesis
      protocol: route-classify@v1
      reads: [user.task, repo.snapshot]
      writes:
        artifact:
          path: artifacts/active-run.md
          schema: active-run@v1
      gate:
        kind: schema_sections
        source: artifacts/active-run.md
        required: [Workflow, Rigor, Current Phase, Goal]
      routes:
        pass: "@complete"
