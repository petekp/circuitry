      routes:
        pass: "@complete"
        fail: "@escalate"

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # CRUCIBLE PATH (7 steps, entry: crucible-frame)
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    - id: crucible-frame
      title: Crucible Frame
      executor: orchestrator
      kind: checkpoint
      protocol: crucible-frame@v1
      reads: [user.task, repo.snapshot]
      writes:
        artifact:
          path: artifacts/problem-brief.md
          schema: problem-brief@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: crucible_frame
        options: [continue]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue]
      routes:
        continue: crucible-diverge

    - id: crucible-diverge
      title: Crucible Diverge
      executor: worker
      kind: dispatch
      protocol: crucible-diverge@v1
      reads: [artifacts/problem-brief.md]
      writes:
        artifacts:
          - path: artifacts/proposal-a.md
            schema: proposal@v1
          - path: artifacts/proposal-b.md
            schema: proposal@v1
          - path: artifacts/proposal-c.md
            schema: proposal@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      budgets:
        max_attempts: 2
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [outputs_ready]
      routes:
        pass: crucible-explore

    - id: crucible-explore
      title: Crucible Explore
      executor: worker
      kind: dispatch
      protocol: crucible-explore@v1
      reads: [artifacts/problem-brief.md, artifacts/proposal-a.md, artifacts/proposal-b.md, artifacts/proposal-c.md]
      writes:
        artifacts:
          - path: artifacts/revised-a.md
            schema: revised-proposal@v1
          - path: artifacts/revised-b.md
            schema: revised-proposal@v1
          - path: artifacts/revised-c.md
            schema: revised-proposal@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      budgets:
        max_attempts: 2
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [outputs_ready]
      routes:
        pass: crucible-stress-test

    - id: crucible-stress-test
      title: Crucible Stress Test
      executor: worker
      kind: dispatch
      protocol: crucible-stress-test@v1
      reads: [artifacts/revised-a.md, artifacts/revised-b.md, artifacts/revised-c.md]
      writes:
        artifacts:
          - path: artifacts/review-a.md
            schema: stress-test-review@v1
          - path: artifacts/review-b.md
            schema: stress-test-review@v1
          - path: artifacts/review-c.md
            schema: stress-test-review@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      budgets:
        max_attempts: 2
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [outputs_ready]
      routes:
        pass: crucible-converge

    - id: crucible-converge
      title: Crucible Converge
      executor: orchestrator
      kind: synthesis
      reads:
        - artifacts/problem-brief.md
        - artifacts/review-a.md
        - artifacts/review-b.md
        - artifacts/review-c.md
      writes:
        artifact:
          path: artifacts/selection-synthesis.md
          schema: selection-synthesis@v1
      gate:
        kind: schema_sections
        source: artifacts/selection-synthesis.md
        required: [Selection, Rationale, Merged Elements]
      routes:
        pass: crucible-harden

    - id: crucible-harden
      title: Crucible Harden
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/selection-synthesis.md]
      writes:
        artifact:
          path: artifacts/pre-mortem.md
          schema: pre-mortem@v1
      gate:
        kind: schema_sections
        source: artifacts/pre-mortem.md
        required: [Failure Scenarios, Edge Cases, Blind Spots]
      routes:
        pass: crucible-select

    - id: crucible-select
      title: Crucible Select
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/selection-synthesis.md, artifacts/pre-mortem.md]
      writes:
        artifact:
          path: artifacts/final-proposal.md
          schema: final-proposal@v1
      gate:
        kind: schema_sections
        source: artifacts/final-proposal.md
        required: [Executive Summary, The System]
      routes:
        pass: "@complete"
        fail: "@escalate"
