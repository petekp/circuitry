    - id: ratchet-closeout
      title: Ratchet Closeout
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/ratchet-plan.md, artifacts/ratchet-final-audit.md, artifacts/ratchet-deferred.md]
      writes:
        artifact:
