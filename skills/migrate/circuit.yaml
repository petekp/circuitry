schema_version: "2"
circuit:
  id: migrate
  version: "2026-04-01"
  purpose: >
    Large-scale migrations and refactors: framework swaps, dependency
    replacements, architecture transitions, and incremental rewrites.

  entry:
    expert_command: /circuit:migrate
    signals:
      include: [framework_swap, dependency_replacement, architecture_transition]
      exclude: [dead_code, overnight]

  entry_modes:
    default:
      start_at: migration-brief
      description: Interactive migration with steering checkpoints.

  steps:
    # ── Phase 1: Scope ───────────────────────────────────────────────────
    - id: migration-brief
      title: Migration Brief
      executor: orchestrator
      kind: checkpoint
      protocol: migration-brief@v1
      reads: [user.task, repo.snapshot]
      writes:
        artifact:
          path: artifacts/migration-brief.md
          schema: migration-brief@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: migration_brief
        options: [continue]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue]
      routes:
        continue: inventory-probes

    # ── Phase 2: Inventory ───────────────────────────────────────────────
    - id: inventory-probes
      title: Dependency Scan + Risk Assessment
      executor: worker
      kind: dispatch
      protocol: inventory-probes@v1
      reads: [artifacts/migration-brief.md]
      writes:
        artifacts:
          - path: artifacts/dependency-inventory.md
            schema: dependency-inventory@v1
          - path: artifacts/risk-assessment.md
            schema: risk-assessment@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [outputs_ready]
      routes:
        pass: coexistence-plan
        fail: "@escalate"

    # ── Phase 3: Strategy ────────────────────────────────────────────────
    - id: coexistence-plan
      title: Coexistence Plan
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/migration-brief.md, artifacts/dependency-inventory.md, artifacts/risk-assessment.md]
      writes:
        artifact:
          path: artifacts/coexistence-plan.md
          schema: coexistence-plan@v1
      gate:
        kind: schema_sections
        source: artifacts/coexistence-plan.md
        required: [Adapter Strategy, Rollback Procedure, Batch Order, Risk-First Ordering]
      routes:
        pass: migration-steer
        fail: "@escalate"

    - id: migration-steer
      title: Migration Steer
      executor: orchestrator
      kind: checkpoint
      protocol: migration-steer@v1
      reads: [artifacts/coexistence-plan.md, artifacts/risk-assessment.md]
      writes:
        artifact:
          path: artifacts/migration-steer.md
          schema: migration-steer@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: migration_steer
        options: [approve, revise]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [approve, revise]
      routes:
        approve: batch-migration
        revise: coexistence-plan

    # ── Phase 4: Execution ───────────────────────────────────────────────
    - id: batch-migration
      title: Batch Migration
      executor: worker
      kind: dispatch
      protocol: workers-execute@v1
      reads: [artifacts/coexistence-plan.md, artifacts/migration-steer.md, artifacts/risk-assessment.md]
      writes:
        artifact:
          path: artifacts/batch-log.md
          schema: batch-log@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      budgets:
        max_attempts: 3
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [complete_and_hardened]
        reroute:
          coexistence_invalidated: coexistence-plan
      routes:
        pass: full-verification
        fail: "@escalate"

    # ── Phase 5: Verification ────────────────────────────────────────────
    - id: full-verification
      title: Full Verification
      executor: worker
      kind: dispatch
      protocol: full-verification@v1
      reads: [artifacts/migration-brief.md, artifacts/dependency-inventory.md, artifacts/batch-log.md]
      writes:
        artifact:
          path: artifacts/verification-report.md
          schema: verification-report@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [verification_complete]
      routes:
        pass: cutover-review
        fail: "@escalate"

    - id: cutover-review
      title: Cutover Review
      executor: worker
      kind: dispatch
      protocol: cutover-review@v1
      reads: [artifacts/coexistence-plan.md, artifacts/batch-log.md, artifacts/verification-report.md]
      writes:
        artifact:
          path: artifacts/cutover-report.md
          schema: cutover-report@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [ready]
        reroute:
          revise: batch-migration
      routes:
        pass: "@complete"
        fail: "@escalate"
