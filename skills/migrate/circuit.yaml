schema_version: "2"
circuit:
  id: migrate
  version: "2026-04-04"
  purpose: >
    Large-scale migrations: framework swaps, dependency replacements,
    architecture transitions, incremental rewrites.

  entry:
    expert_command: /circuit:migrate
    signals:
      include: [framework_swap, dependency_replacement, architecture_transition]
      exclude: [dead_code, overnight, feature]

  entry_modes:
    default:
      start_at: frame
      description: Deep migration with steering checkpoints.
    standard:
      start_at: frame
      description: Standard migration. Coexistence plan checkpoint only.
    autonomous:
      start_at: frame
      description: Unattended migration. Auto-resolve checkpoints except coexistence plan.

  steps:
    - id: frame
      title: Frame
      executor: orchestrator
      kind: checkpoint
      protocol: migrate-frame@v1
      reads: [user.task, repo.snapshot]
      writes:
        artifact:
          path: artifacts/brief.md
          schema: brief-migrate@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: migrate_frame
        options: [continue]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue]
      routes:
        continue: inventory

    - id: inventory
      title: Inventory
      executor: worker
      kind: dispatch
      protocol: migrate-inventory@v1
      reads: [artifacts/brief.md]
      writes:
        artifact:
          path: artifacts/inventory.md
          schema: inventory@v1
        request: jobs/{step_id}-{attempt}.request.json
        receipt: jobs/{step_id}-{attempt}.receipt.json
        result: jobs/{step_id}-{attempt}.result.json
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}.result.json
        pass: [map_complete]
      routes:
        pass: plan

    - id: plan
      title: Coexistence Plan
      executor: orchestrator
      kind: checkpoint
      protocol: migrate-plan@v1
      reads: [artifacts/brief.md, artifacts/inventory.md]
      writes:
        artifact:
          path: artifacts/plan.md
          schema: plan-migrate@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: migration_steer
        options: [continue, adjust]
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue, adjust]
      routes:
        continue: execute
        adjust: plan

    - id: execute
      title: Batch Execution
      executor: worker
      kind: dispatch
      protocol: migrate-execute@v1
      reads: [artifacts/plan.md, artifacts/inventory.md]
      writes:
        artifact:
          path: artifacts/batch-log.md
          schema: batch-log@v1
        request: jobs/{step_id}-{attempt}.request.json
        receipt: jobs/{step_id}-{attempt}.receipt.json
        result: jobs/{step_id}-{attempt}.result.json
      budgets:
        max_attempts: 3
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}.result.json
        pass: [complete_and_hardened, partial]
        reroute:
          coexistence_invalidated: plan
      routes:
        pass: verify

    - id: verify
      title: Full Verification
      executor: worker
      kind: dispatch
      protocol: migrate-verify@v1
      reads: [artifacts/plan.md, artifacts/batch-log.md]
      writes:
        artifact:
          path: artifacts/verification-report.md
          schema: verification-report@v1
        request: jobs/{step_id}-{attempt}.request.json
        receipt: jobs/{step_id}-{attempt}.receipt.json
        result: jobs/{step_id}-{attempt}.result.json
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}.result.json
        pass: [verification_complete, clean]
      routes:
        pass: review

    - id: review
      title: Cutover Review
      executor: worker
      kind: dispatch
      protocol: migrate-review@v1
      reads: [artifacts/brief.md, artifacts/plan.md, artifacts/verification-report.md]
      writes:
        artifact:
          path: artifacts/review.md
          schema: review@v1
        request: jobs/{step_id}-{attempt}.request.json
        receipt: jobs/{step_id}-{attempt}.receipt.json
        result: jobs/{step_id}-{attempt}.result.json
      budgets:
        max_attempts: 2
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}.result.json
        pass: [ready, ship_ready, clean]
        reroute:
          revise: execute
      routes:
        pass: close

    - id: close
      title: Close
      executor: orchestrator
      kind: synthesis
      protocol: migrate-close@v1
      reads: [artifacts/brief.md, artifacts/inventory.md, artifacts/plan.md, optional:artifacts/review.md]
      writes:
        artifact:
          path: artifacts/result.md
          schema: result@v1
      gate:
        kind: schema_sections
        source: artifacts/result.md
        required: [Changes, Verification]
      routes:
        pass: "@complete"
