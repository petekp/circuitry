schema_version: 1
claims:
  - id: CLAIM-FLOW-CATALOG-CURRENT
    claim: Circuit has current public flow packages for Build, Explore, Fix, Pursue, and Review.
    type: flow
    status: verified_current
    surfaces: [README.md, docs/release/parity-matrix.generated.md]
    backing:
      capability_ids: [flow:build, flow:explore, flow:fix, flow:pursue, flow:review]
      script_checks: [scripts/release/emit-current-capabilities.ts --check]
    user_risk: If false, the release catalog itself is misleading.
    readiness_refs: [REL-004]
  - id: CLAIM-FIX-CANONICAL
    claim: Fix is Circuit's public bug-fixing flow.
    type: flow
    status: verified_current
    surfaces: [README.md, plugins/claude/commands/run.md, docs/release/parity-matrix.generated.md]
    backing:
      capability_ids: [flow:fix]
      script_checks: [scripts/release/emit-current-capabilities.ts --check]
    user_risk: Users need one clear bug-fixing entry point, not two names for the same kind of work.
    readiness_refs: [REL-018]
  - id: CLAIM-CUSTOM-CONNECTOR-PROTOCOL
    claim: Custom connectors use the documented prompt-file/output-file protocol.
    type: connector
    status: verified_current
    surfaces: [README.md, docs/contracts/connector.md]
    backing:
      capability_ids: [connector:custom]
      test_paths:
        - tests/runner/custom-connector-runtime.test.ts
        - tests/runner/runner-relay-provenance.test.ts
        - tests/contracts/host-experience-docs.test.ts
      script_checks: [scripts/release/emit-current-capabilities.ts --check]
    user_risk: Users following docs must be able to build a compatible connector.
    readiness_refs: [REL-001]
  - id: CLAIM-CODEX-WRITABLE
    claim: codex is the first-class write-capable Codex worker connector.
    type: connector
    status: verified_current
    surfaces: [README.md, docs/contracts/connector.md, docs/contracts/host-capabilities.md, docs/configuration.md]
    backing:
      capability_ids: [connector:codex]
      test_paths:
        - tests/contracts/connector-schema.test.ts
        - tests/contracts/codex-connector-schema.test.ts
        - tests/runtime/connectors.test.ts
      script_checks: [scripts/release/emit-current-capabilities.ts --check]
    user_risk: Users may route Codex work incorrectly if the writable connector contract drifts from docs or tests.
    readiness_refs: [REL-002]
  - id: CLAIM-RICH-ROUTES
    claim: Rich recovery routes are emitted into compiled flows and checkpoint selections can execute them.
    type: safety
    status: verified_current
    surfaces: [docs/release/parity-matrix.generated.md, docs/release/readiness-report.generated.md]
    backing:
      capability_ids: [route-outcomes:rich]
      test_paths:
        - tests/unit/compile-schematic-per-mode.test.ts
        - tests/runner/terminal-outcome-mapping.test.ts
      script_checks: [scripts/release/emit-current-capabilities.ts --check]
    user_risk: Real failures can abort instead of retrying, revising, asking, handing off, or escalating.
    readiness_refs: [REL-003]
  - id: CLAIM-REVIEW-EVIDENCE-POLICY
    claim: Review sends untracked paths and sizes by default; untracked file contents require explicit opt-in and still apply skip/truncation safeguards.
    type: safety
    status: verified_current
    surfaces: [README.md, plugins/claude/commands/run.md, plugins/claude/commands/review.md, docs/release/readiness-report.generated.md]
    backing:
      capability_ids: [safety:review-untracked-evidence]
      test_paths:
        - tests/runner/review-runtime-wiring.test.ts
        - tests/runner/cli-router.test.ts
    user_risk: Untracked scratch or secret-like files could be relayed unexpectedly if this regresses.
    readiness_refs: [REL-005]
  - id: CLAIM-PLAN-EXECUTION
    claim: Plan-execution requests must start the right work slice, ask one blocking question, or return one exact next command.
    type: plan-execution
    status: verified_current
    surfaces: [plugins/claude/commands/run.md, plugins/codex/skills/run/SKILL.md, docs/release/readiness-report.generated.md]
    backing:
      capability_ids: [feature:plan-execution]
      proof_ids: [proof:plan-execution]
      test_paths:
        - tests/contracts/flow-router.test.ts
        - tests/runner/cli-router.test.ts
      script_checks: [scripts/release/emit-current-capabilities.ts --check]
    user_risk: Users can ask Circuit to execute a plan and receive analysis-only output that preserves the next-action burden.
    readiness_refs: [REL-016]
  - id: CLAIM-WRITE-CAPABLE-WORKER
    claim: Write-capable worker behavior must be disclosed before first Build/Fix runs that can edit files.
    type: safety
    status: verified_current
    surfaces: [README.md, progress output, final summaries]
    backing:
      capability_ids: [safety:write-capable-worker]
      test_paths:
        - tests/runner/cli-router.test.ts
        - tests/runner/operator-summary-writer.test.ts
      script_checks: [scripts/release/emit-current-capabilities.ts --check]
    user_risk: Users may be surprised that a delegated worker can edit files with bypassed host approvals.
    readiness_refs: [REL-007]
  - id: CLAIM-GOLDEN-PROOF
    claim: Public proof must cover doing work, deciding, continuity, customization, failure, first-run, and plan execution.
    type: proof
    status: verified_current
    surfaces: [README.md, docs/release/proofs/index.yaml, docs/release/proofs/runs]
    backing:
      proof_ids:
        - proof:routed-build
        - proof:explicit-build
        - proof:review
        - proof:checkpoint-resume
        - proof:abort-failure
        - proof:fix
        - proof:explore-decision
        - proof:handoff
        - proof:customization
        - proof:doctor-first-run
        - proof:plan-execution
      script_checks: [scripts/release/check-proof-coverage.ts]
    user_risk: Circuit will look like a prompt wrapper without durable examples that show the operator system working.
    readiness_refs: [REL-011, REL-023]
  - id: CLAIM-FIRST-RUN-DOCTOR
    claim: First-run onboarding should begin with a doctor step before the first useful run.
    type: first-run
    status: verified_current
    surfaces: [README.md, docs/first-run.md]
    backing:
      proof_ids: [proof:doctor-first-run]
      test_paths:
        - tests/contracts/host-experience-docs.test.ts
      script_checks: [scripts/release/emit-current-capabilities.ts --check]
    user_risk: A setup failure can be mistaken for a product failure.
    readiness_refs: [REL-017]
