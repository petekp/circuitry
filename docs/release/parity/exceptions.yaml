schema_version: 1
exceptions:
  - id: EX-REL-004-FIX-INTENT-MODE
    capability_id: router:intent:fix
    status: approved_exception
    readiness_ref: REL-004
    rationale: Original Circuit treated bare "fix:" as Lite. Circuit intentionally keeps bare "fix:" at normal routing depth and reserves Lite for explicit quick/small/tiny/simple Fix language so serious bug fixes do not skip review.
    public_wording: Bare "fix:" selects the Fix flow; Lite requires an explicit quick/small/tiny/simple hint or an explicit mode flag.
  - id: EX-REL-007-WRITE-CAPABLE-DISCLOSURE
    capability_id: safety:write-capable-worker
    status: approved_exception
    readiness_ref: REL-007
    rationale: Write-capable worker behavior is now disclosed in first-run docs, progress output, and final summaries.
    public_wording: Write-capable worker behavior is disclosed before use.
