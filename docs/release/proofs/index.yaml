      - examples/runs/checkpoint/run/reports/result.json
    exception_ids: []
    readiness_refs: [REL-011]
  - id: proof:abort-failure
    title: Abort And Failure Summary
    category: failure
    command: ./bin/circuit-next run build --goal "simulate connector failure" --progress jsonl
    expected_flow: build
    expected_outcome: aborted
    summary_contract: Summary explains what failed, whether any files may have changed, and the exact next action.
    redaction_policy: Failure output is truncated and scrubbed.
    required_files:
      - examples/runs/abort/progress.jsonl
