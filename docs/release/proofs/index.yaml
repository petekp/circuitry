  - id: proof:explore-decision
    title: Explore Decision Or Tournament
    category: deciding
    command: './bin/circuit-next run --goal "decide: React vs Vue" --run-folder examples/runs/explore-decision/run --progress jsonl; ./bin/circuit-next resume --run-folder examples/runs/explore-decision/run --checkpoint-choice option-2 --progress jsonl'
