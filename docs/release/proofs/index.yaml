schema_version: 1
scenarios:
  - id: proof:routed-build
    title: Routed Build
    category: doing-work
    command: './bin/circuit-next run --goal "develop: add a small safe change" --progress jsonl'
    expected_flow: build
    expected_outcome: complete or needs_attention
    summary_contract: Summary states selected work type, changes, verification, review, risk, and next action.
    redaction_policy: No secrets or untracked file contents in checked-in example.
    required_files:
      - examples/runs/routed-build/progress.jsonl
      - examples/runs/routed-build/operator-summary.md
      - examples/runs/routed-build/result.json
    status: verified_current
    backing_paths:
      - examples/runs/routed-build/run/reports/build/brief.json
      - examples/runs/routed-build/run/reports/build/plan.json
      - examples/runs/routed-build/run/reports/build/implementation.json
      - examples/runs/routed-build/run/reports/build/verification.json
      - examples/runs/routed-build/run/reports/build/review.json
      - examples/runs/routed-build/run/reports/build-result.json
      - examples/runs/routed-build/run/reports/checkpoints/frame-step-request.json
      - examples/runs/routed-build/run/reports/checkpoints/frame-step-response.json
      - examples/runs/routed-build/run/reports/relay/build-act.receipt.txt
      - examples/runs/routed-build/run/reports/relay/build-review.receipt.txt
    exception_ids: []
    readiness_refs: [REL-011]
  - id: proof:explicit-build
    title: Explicit Build
    category: doing-work
    command: ./bin/circuit-next run build --goal "add a focused change" --entry-mode deep --progress jsonl
    expected_flow: build
    expected_outcome: complete or checkpoint_waiting
    summary_contract: Summary explains explicit Build selection, checkpoint/verification state, and next action.
    redaction_policy: No project-private content beyond the synthetic fixture repo.
    required_files:
      - examples/runs/explicit-build/progress.jsonl
      - examples/runs/explicit-build/operator-summary.md
      - examples/runs/explicit-build/result.json
    status: verified_current
    backing_paths:
      - examples/runs/explicit-build/run/reports/build/brief.json
      - examples/runs/explicit-build/run/reports/checkpoints/frame-step-request.json
    exception_ids: []
    readiness_refs: [REL-011]
  - id: proof:review
    title: Standalone Review
    category: doing-work
    command: ./bin/circuit-next run review --goal "review this change" --progress jsonl
    expected_flow: review
    expected_outcome: complete or needs_attention
    summary_contract: Summary lists review verdict, findings, evidence policy, and next action.
    redaction_policy: Untracked contents are excluded unless an explicit opt-in example is used.
    required_files:
      - examples/runs/review/progress.jsonl
      - examples/runs/review/operator-summary.md
      - examples/runs/review/result.json
    status: verified_current
    backing_paths:
      - examples/runs/review/run/reports/review-intake.json
      - examples/runs/review/run/reports/review-result.json
      - examples/runs/review/run/reports/relay/review.receipt.txt
      - examples/runs/review/run/reports/result.json
    exception_ids: []
    readiness_refs: [REL-005, REL-011]
  - id: proof:checkpoint-resume
    title: Checkpoint And Resume
    category: continuity
    command: ./bin/circuit-next run build --goal "deep change that asks for scope" --entry-mode deep --progress jsonl
    expected_flow: build
    expected_outcome: checkpoint_waiting then complete after resume
    summary_contract: Summary gives the checkpoint question, allowed choices, resume command, and final outcome.
    redaction_policy: Checkpoint files contain no private source snippets.
    required_files:
      - examples/runs/checkpoint/progress.jsonl
      - examples/runs/checkpoint/operator-summary.md
      - examples/runs/checkpoint/result.json
    status: verified_current
    backing_paths:
