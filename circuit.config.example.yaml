# circuit.config.yaml -- Per-project configuration for Circuit
#
# Place this file at your project root (./circuit.config.yaml) or globally
# at ~/.claude/circuit.config.yaml. Project-level config takes precedence.
#
# Copy this file to your project root as circuit.config.yaml and customize.

# Dispatch adapter configuration.
# Resolution order:
#   1. explicit --adapter
#   2. dispatch.roles.<role>
#   3. dispatch.circuits.<circuit>
#   4. dispatch.default
#   5. auto-detect (codex if installed, else agent)
#
# Built-ins:
# - `agent` uses Claude Code's Agent tool with worktree isolation
# - `codex` runs Codex CLI via Circuit's runtime process transport
#
# Custom adapters are wrapper executables defined as argv arrays. Circuit
# appends `PROMPT_FILE OUTPUT_FILE` as the final two positional args.
dispatch:
  default: auto
  roles:
    implementer: codex
    reviewer: agent
    researcher: agent
  circuits:
    migrate: codex
    explore: gemini
  adapters:
    gemini:
      command:
        - ./docs/examples/gemini-dispatch.sh
        - --model
        - gemini-2.5-pro

# Per-circuit skill overrides (optional).
# Use this to assign specific skills to a circuit. Comma-separated skill
# names are injected into the dispatch prompt for that circuit.
# An empty string means no extra skills (use engine defaults).
circuits:
  run:
    skills: ""
  build:
    skills: ""
  sweep:
    skills: "dead-code-sweep"
  migrate:
    skills: ""
