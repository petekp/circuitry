# circuit.config.yaml -- Optional per-project configuration for Circuitry
#
# Place this file at your project root (./circuit.config.yaml) or globally
# at ~/.claude/circuit.config.yaml. Project-level config takes precedence.
#
# When compose-prompt.sh is called with --circuit <id> but no --skills flag,
# it reads the skills list from this file. Explicit --skills always wins.
#
# Generate this file automatically with: /circuit:setup

# Map each circuit to the domain skills that should be injected into worker prompts.
# Skills must be installed in ~/.claude/skills/<name>/ or the plugin's skills/ directory.
# Maximum 2 domain skills per circuit dispatch (3 total including manage-codex).

circuits:
  run:
    skills: []  # auto-detected from file scope; override here if needed
  develop:
    skills: [tdd, deep-research]
  decide:
    skills: [architecture-exploration, solution-explorer]
  harden-spec:
    skills: [architecture-exploration]
  repair-flow:
    skills: [tdd]
  ratchet-quality:
    skills: [clean-architecture, tdd]
  cleanup:
    skills: [dead-code-sweep]

# Dispatch engine configuration (optional).
# Controls what process runs dispatch steps. Default: auto-detect (codex if
# installed, otherwise agent).
#
# Built-in engines: "codex", "agent"
# Custom engines: any shell command that accepts (prompt_file, output_file)
#   e.g. "gemini run", "claude -p", "./scripts/my-agent.sh"
#
# dispatch:
#   engine: auto               # global default (auto | codex | agent | <command>)
#   per_circuit:               # override per circuit
#     develop: codex
#     decide: agent
