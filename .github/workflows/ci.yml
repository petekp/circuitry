name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --prefix scripts/runtime/engine
      - run: ./scripts/verify-install.sh

      # Verify generated markdown/JSON surfaces are fresh.
      # catalog-compiler is the single source of truth for the following and
      # will overwrite them on generate: commands/*.md shims, CIRCUITS.md
      # blocks, skills/*/SKILL.md contract blocks, .claude-plugin/public-commands.txt,
      # scripts/runtime/generated/*.json.
      - name: Check catalog-compiler freshness
        run: |
          if ! node scripts/runtime/bin/catalog-compiler.js generate --check; then
            echo "::error::Generated surfaces are stale. Run 'node scripts/runtime/bin/catalog-compiler.js generate' and commit the result."
            exit 1
          fi

      # Verify committed bundles are fresh -- rebuild and diff against committed artifacts
      - name: Check bundle freshness
        run: |
          cd scripts/runtime/engine
          node esbuild.config.mjs
          cd ../../..
          if ! git diff --quiet scripts/runtime/bin/; then
            echo "::error::Committed runtime bundles are stale. Run 'cd scripts/runtime/engine && node esbuild.config.mjs' and commit the result."
            git diff --stat scripts/runtime/bin/
            exit 1
          fi

      - run: cd scripts/runtime/engine && npx vitest run
