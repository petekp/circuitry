name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --prefix scripts/runtime/engine
      - run: ./scripts/verify-install.sh
      - run: cd scripts/runtime/engine && npx vitest run
